<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZYTRIX AI — Imagens Profissionais</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="logo">
      <span class="logo-z">Z</span>YTRIX
      <span class="logo-ai">AI</span>
    </div>
    <p class="tagline">Transforme sua foto em imagem profissional com IA</p>
  </header>

  <main class="container">

    <!-- PAINEL DE CONTROLE -->
    <section class="panel">

      <div class="panel-section">
        <label class="label">
          <span class="label-icon">📸</span>
          Sua Foto <span class="required">*</span>
        </label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="photoInput" accept="image/*" hidden />
          <div class="upload-content" id="uploadContent">
            <div class="upload-icon">⬆</div>
            <p>Clique ou arraste sua foto aqui</p>
            <span>JPG, PNG, WEBP — máx 10MB</span>
          </div>
          <img id="photoPreview" class="photo-preview hidden" alt="Preview" />
        </div>
      </div>

      <div class="panel-section">
        <label class="label" for="styleSelect">
          <span class="label-icon">✦</span>
          Estilo da Imagem
        </label>
        <select id="styleSelect" class="select">
          <option value="Foto profissional corporativa, terno, ambiente executivo">💼 Corporativo Executivo</option>
          <option value="Foto profissional para LinkedIn, sorriso confiante, fundo neutro">🔗 LinkedIn Premium</option>
          <option value="Retrato artístico fashion, iluminação dramática, editorial de moda">👗 Fashion Editorial</option>
          <option value="Foto de perfil para redes sociais, look casual luxuoso, ambiente moderno">✨ Social Premium</option>
          <option value="Retrato cinematográfico, iluminação de filme, profundidade de campo">🎬 Cinematográfico</option>
          <option value="Foto empresarial CEO, confiança e autoridade, ambiente de escritório premium">👑 CEO / Liderança</option>
          <option value="Retrato criativo artístico, cores vibrantes, composição única">🎨 Artístico Criativo</option>
          <option value="Foto para pitch de startup, jovem profissional, inovação e tecnologia">🚀 Tech Startup</option>
        </select>
      </div>

      <div class="panel-section">
        <label class="label" for="referenceText">
          <span class="label-icon">✍</span>
          Referência Adicional <span class="optional">(opcional)</span>
        </label>
        <textarea
          id="referenceText"
          class="textarea"
          placeholder="Ex: quero fundo azul, terno preto, expressão séria, iluminação suave..."
          rows="3"
        ></textarea>
      </div>

      <button class="btn-generate" id="btnGenerate">
        <span class="btn-icon">⚡</span>
        <span id="btnText">GERAR IMAGENS COM IA</span>
      </button>

      <div class="error-box hidden" id="errorBox">
        <span class="error-icon">⚠</span>
        <span id="errorMsg"></span>
      </div>

    </section>

    <!-- RESULTADO -->
    <section class="results hidden" id="resultsSection">
      <div class="results-header">
        <h2 class="results-title">Suas Imagens Geradas</h2>
        <button class="btn-download-all" id="btnDownloadAll">
          ⬇ Baixar Todas
        </button>
      </div>
      <div class="images-grid" id="imagesGrid"></div>
    </section>

  </main>

  <footer class="footer">
    <p>ZYTRIX AI &copy; 2025 — Powered by Claude + Flux</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
